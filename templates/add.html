<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>➕ Add Student</h1>
        <p class="subtitle">Fill in the details below to add a new student.</p>

        {% if error_message %}
            <div class="alert-error">{{ error_message }}</div>
        {% endif %}

        <form method="POST" action="/add" class="student-form">
            <label for="roll_no">Roll Number</label>
            <input type="text" id="roll_no" name="roll_no" placeholder="e.g. 101" required>

            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Anita Sharma" required>

            <label for="marks">Marks (0-100)</label>
            <input type="text" id="marks" name="marks" placeholder="e.g. 85" required>

            <button type="submit" class="btn-primary">Save Student</button>
        </form>

        <a href="/" class="back-link">&larr; Back to Home</a>
    </div>

</body>
</html>
