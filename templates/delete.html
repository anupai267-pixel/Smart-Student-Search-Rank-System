<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>🗑️ Delete Student</h1>

        <div class="alert-error">
            Are you sure you want to delete <strong>{{ student['name'] }}</strong>
            (Roll No: {{ student['roll_no'] }}, Marks: {{ student['marks'] }})?
            This action cannot be undone.
        </div>

        <form method="POST" action="/delete/{{ student['id'] }}">
            <button type="submit" class="btn-primary btn-danger">Yes, Delete</button>
        </form>

        <a href="/students" class="back-link">&larr; Cancel and Go Back</a>
    </div>

</body>
</html>
