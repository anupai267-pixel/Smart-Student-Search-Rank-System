<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>📝 Register</h1>
        <p class="subtitle">Create an account to use the Smart Student System.</p>

        {% if error_message %}
            <div class="alert-error">{{ error_message }}</div>
        {% endif %}

        <form method="POST" action="/register" class="student-form">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="At least 4 characters" required>

            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-type your password" required>

            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <p class="auth-switch">Already have an account? <a href="/login">Login here</a></p>
    </div>

</body>
</html>
