<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>✏️ Edit Student</h1>
        <p class="subtitle">Update this student's details below.</p>

        {% if error_message %}
            <div class="alert-error">{{ error_message }}</div>
        {% endif %}

        <form method="POST" class="student-form">
            <label for="roll_no">Roll Number</label>
            <input type="text" id="roll_no" name="roll_no" value="{{ student['roll_no'] }}" required>

            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="{{ student['name'] }}" required>

            <label for="marks">Marks (0-100)</label>
            <input type="text" id="marks" name="marks" value="{{ student['marks'] }}" required>

            <button type="submit" class="btn-primary">Save Changes</button>
        </form>

        <a href="/students" class="back-link">&larr; Back to View Students</a>
    </div>

</body>
</html>
